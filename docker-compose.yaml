version: "3.8"

services:
    db:
        image: "postgres:16.3"
        container_name: postgres-db
        volumes:
            - db-data:/var/lib/postgresql/data/
        environment:
            POSTGRES_DB: go-social
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: adminpassword
        ports:
            - "5432:5432"

volumes:
    db-data:
